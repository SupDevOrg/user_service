spring:
  liquibase:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
  cache:
    type: simple

jwt:
  secret: testSecretKeyForTestingPurposesOnlyMustBe32BytesLong
  access-expiration-ms: 900000
  refresh-expiration-ms: 2592000000

logging:
  level:
    ru.sup.userservice: WARN
